# Supabase project configuration
# Push to hosted project: npx supabase config push --project-ref dpslgrukuuvgbcbhibsf

project_id = "dpslgrukuuvgbcbhibsf"

[auth]
site_url = "https://tasktracker.hscvpl.in"
additional_redirect_urls = [
  "https://tasktracker.hscvpl.in",
  "https://tasktracker.hscvpl.in/**",
  "http://localhost:5173"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
otp_expiry = 3600
otp_length = 6

# SMTP is configured directly in Supabase Dashboard → Settings → Authentication → SMTP
# Host: smtp.resend.com  Port: 587  User: resend  From: noreply@hscvpl.in  Name: TaskTracker
# Password: your Resend API key (re_...)

[auth.email.template.confirmation]
subject = "Confirm your TaskTracker account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your TaskTracker password"
content_path = "./supabase/templates/reset.html"

[auth.email.template.email_change]
subject = "Confirm your new email address — TaskTracker"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.invite]
subject = "You've been invited to TaskTracker"
content_path = "./supabase/templates/invite.html"
