services:
  - type: static
    name: task-tracker
    buildCommand: rm -rf node_modules package-lock.json && npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: NODE_VERSION
        value: 22.12.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
